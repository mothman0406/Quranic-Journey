packages:
  "framer-motion": "For smooth page transitions and delightful, nurturing interactions suitable for a family app."
  "recharts": "For rendering progress charts and weekly practice statistics."
  "date-fns": "For formatting review dates and session histories clearly."
  "clsx": "Utility for constructing className strings conditionally."
  "tailwind-merge": "Utility for merging tailwind classes safely."

images:
